adk_models:
  # Default coordinator / specialist model (used in google_adk_agents/config.py)
  default_model: "anthropic/claude-sonnet-4-6"

  # Judge model used to evaluate task results
  judge_model: "anthropic/claude-sonnet-4-6"

  # Available model names for benchmark runs (keys shown in reports)
  available_models:
    "gemini-2.0-flash-exp":
      display_name: "Gemini 2.0 Flash Experimental"
    "gemini-1.5-pro":
      display_name: "Gemini 1.5 Pro"
    "gemini-1.5-flash":
      display_name: "Gemini 1.5 Flash"
    "anthropic/claude-sonnet-4-5-20250929":
      display_name: "Claude Sonnet 4.5"
    "anthropic/claude-sonnet-4-6":
      display_name: "Claude Sonnet 4.6"

content_compression:
  # Total context token count that triggers history summarisation
  token_threshold: 100_000

  # Single tool-result token count that triggers per-result compression
  tool_result_threshold: 10_000

  # Total context threshold above which the LLM call is skipped
  # and rule-based truncation is used
  hard_limit_threshold: 180_000

  # Model used internally by ContentCompressor for LLM-based summarisation
  # (defaults to the executor's model_override; explicit value here overrides that)
  # Leave null to inherit from the executing agent's model
  compressor_model: null  # e.g. "gemini-1.5-flash" for a cheaper summarisation model

adk_execution:
  # ADK InMemoryRunner app name (must be stable across runs for session reuse)
  app_name: "mcp_bench_adk"

  # User ID used when creating ADK sessions
  user_id: "benchmark_user"

  # Maximum number of LLM invocations (events) per task before the agent is
  # considered stuck. None = no limit (rely on task_timeout from root config).
  max_llm_invocations: null

  # Whether to eagerly preload MCP toolsets during agent setup (recommended:
  # true – avoids first-query latency and surface connection errors early)
  preload_mcp_toolsets: true

  # How specialist agents are wired to the coordinator:
  #   "sub_agents" – classic ADK routing via transfer_to_agent (built-in)
  #   "tools"      – each specialist is wrapped with AgentTool and placed in
  #                  the coordinator's tools list; the coordinator calls them
  #                  as regular function-call tools instead of transferring
  agent_routing_mode: "tools"

adk_mcp:
  # Add server name as prefix to each tool name to ensure uniqueness across agents
  add_server_prefix: true

  # Path to the MCP servers catalog used for fallback available_tools resolution
  # Relative to the workspace root
  servers_catalog_path: "mcp_servers_info.json"

  # Resident (always-on) servers — mirrors benchmark.resident_servers in root config
  # but scoped here so ADK runner can be configured independently
  resident_servers:
    - "Time MCP"

adk_benchmark:
  # Enable dependency-analysis reference for evaluation
  # (root config: benchmark.enable_dependency_analysis_ref_for_eval)
  enable_dependency_analysis_ref_for_eval: true

  # MCP servers catalog path override for the runner
  mcp_servers_catalog_path: "mcp_servers_info.json"

# ---------------------------------------------------------------------------
# Fields copied from root benchmark_config.yaml so the ADK runner is
# self-contained and does not need to import config.config_loader at all.
# ---------------------------------------------------------------------------

benchmark:
  # Default tasks file path (null = run all task files below)
  tasks_file: null
  # All task files used in a full benchmark run
  all_task_files:
    - "./tasks/mcpbench_tasks_single_runner_format.json"
    - "./tasks/mcpbench_tasks_multi_2server_runner_format.json"
    - "./tasks/mcpbench_tasks_multi_3server_runner_format.json"
  # Default number of distraction servers
  distraction_servers_default: 10
  # Inter-task delay (seconds)
  task_delay: 1
  # Enable LLM judge stability testing
  enable_judge_stability: true
  # Filter out known problematic tools
  filter_problematic_tools: true
  # Enable concurrent content summarization
  concurrent_summarization: true
  # Use fuzzy task descriptions
  use_fuzzy_descriptions: false
  # Provide original concrete description as reference during evaluation
  enable_concrete_description_ref_for_eval: true

execution:
  # Single task execution timeout (seconds)
  task_timeout: 5000
  # Maximum task retry count
  task_retry_max: 3
  # Retry delay interval (seconds)
  retry_delay: 5
  # Problematic tools that should be filtered out
  problematic_tools:
    - "Paper Search:search_semantic"
    - "Paper Search:download_semantic"
    - "Paper Search:read_semantic_paper"
    - "OSINT Intelligence:osint_overview"
    - "Paper Search:search_iacr"
    - "Paper Search:read_iacr_paper"
    - "Paper Search:download_iacr"
    - "BioMCP:alphagenome_predictor"

mcp:
  # Default MCP server port
  default_port: 3001

evaluation:
  # Number of judge stability test runs
  judge_stability_runs: 5
